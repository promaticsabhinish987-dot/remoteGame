<!DOCTYPE html>
<html>
<head>
  <title>Remote Game</title>
</head>
<style>
/* =====================
   GLOBAL RESET
===================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: sans-serif;
  overflow: hidden;
}

/* =====================
   MENU
===================== */
#menu {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh; /* dynamic viewport for mobile */
  gap: 20px;
}

#menu button {
  padding: 16px 24px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #222;
  color: white;
}

/* =====================
   REMOTE UI (MOBILE FIRST)
===================== */
#remoteUI {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100dvh;
  padding: 16px;
}

/* Top input section */
#remoteUI input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#remoteUI .connect {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  background: #007bff;
  color: white;
  border: none;
  margin-bottom: 20px;
}

.dpad {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 1;
  margin: auto;

  display: grid;
  grid-template-areas:
    ". up ."
    "left center right"
    ". down .";

  gap: 16px;
  touch-action: manipulation;
}

.dpad button {
  width: 100%;
  height: 100%;

  /* 🔥 key fix */
  font-size: 6vw;

  /* 🔥 minimum touch size */
  min-width: 70px;
  min-height: 70px;

  border: none;
  border-radius: 18px;
  background: #222;
  color: white;

  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

/* keep positions */
.up    { grid-area: up; }
.left  { grid-area: left; }
.right { grid-area: right; }
.down  { grid-area: down; }

.dpad button:active {
  transform: scale(0.92);
  background: #555;
}

/* Position */
.up    { grid-area: up; }
.left  { grid-area: left; }
.right { grid-area: right; }
.down  { grid-area: down; }

/* Press feedback */
.dpad button:active {
  transform: scale(0.92);
  background: #555;
}

/* =====================
   CANVAS (GAME SCREEN)
===================== */
#gameCanvas {
  width: 100vw;
  height: 100dvh;
  display: block;
  background: black;
}
</style>

<body>

<div id="menu">
  <button onclick="startMonitor()">Monitor</button>
  <button onclick="showRemote()">Remote</button>
</div>

<div id="remoteUI" style="display:none;">
<input id="roomInput" placeholder="Enter Room ID" />
<button class="connect" onclick="joinRemote()">Connect</button>

<div class="dpad">
  <button class="up"
    ontouchstart="press('ArrowUp')"
    ontouchend="release('ArrowUp')"
    onmousedown="press('ArrowUp')"
    onmouseup="release('ArrowUp')">↑</button>

  <button class="left"
    ontouchstart="press('ArrowLeft')"
    ontouchend="release('ArrowLeft')"
    onmousedown="press('ArrowLeft')"
    onmouseup="release('ArrowLeft')">←</button>

  <button class="right"
    ontouchstart="press('ArrowRight')"
    ontouchend="release('ArrowRight')"
    onmousedown="press('ArrowRight')"
    onmouseup="release('ArrowRight')">→</button>

  <button class="down"
    ontouchstart="press('ArrowDown')"
    ontouchend="release('ArrowDown')"
    onmousedown="press('ArrowDown')"
    onmouseup="release('ArrowDown')">↓</button>
</div>
</div>

<canvas id="gameCanvas" width="800" height="500" style="display:none;"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let roomId = null;
let isMonitor = false;

// =====================
// MENU
// =====================

function startMonitor() {
  isMonitor = true;
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameCanvas").style.display = "block";

  socket.emit("createRoom");
}
// 🔥 ADD THIS
socket.on("errorRoom", (msg) => {
  alert(msg); // invalid room
});

// 🔥 ADD THIS (outside functions)
setInterval(() => {
  if (roomId) {
    socket.emit("input", { roomId, keys });
  }
}, 50); // 20 FPS network tick


socket.on("roomCreated", id => {
  roomId = id;
  alert("Room ID: " + roomId);
  console.log("Room ID: " + roomId)
  setTimeout(() => {
   startGame(); // start your game
  }, 10000);
  
});

function showRemote() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("remoteUI").style.display = "block";
}

function joinRemote() {
  roomId = document.getElementById("roomInput").value;
  socket.emit("joinRoom", roomId);
}

socket.on("joinedRoom", () => {
  alert("Connected to monitor");
});

// =====================
// REMOTE INPUT
// =====================

const keys = {};

function press(key) {
  keys[key] = true;
//   sendInput();
}

function release(key) {
  keys[key] = false;
//   sendInput();
}

function sendInput() {
  socket.emit("input", { roomId, keys });
}

// =====================
// MONITOR GAME
// =====================

let remoteKeys = {};

// 🔥 WITH (ensures correct object)
socket.on("input", keys => {
  remoteKeys = keys;
});

// ===== YOUR GAME (modified input) =====

function startGame(){
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const player = { x:100, y:100, size:60, speed:4 };
const enemies = [];
const foods = [];
let score = 0;

const playerImg = new Image();
playerImg.src = "player.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";

const foodImg = new Image();
foodImg.src = "food.png";

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:40,
    speed:1
  });
}

// 🔥 ADD THIS
function resetGame(){
  player.x = 100;
  player.y = 100;
  score = 0;
  enemies.length = 0;
  foods.length = 0;

  for(let i=0;i<3;i++) spawnEnemy();
  for(let i=0;i<5;i++) spawnFood();
}

function spawnFood(){
  foods.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:25
  });
}

for(let i=0;i<3;i++) spawnEnemy();
for(let i=0;i<5;i++) spawnFood();

function update(){

  // 🔥 USE REMOTE INPUT INSTEAD OF KEYBOARD
  if (remoteKeys["ArrowRight"]) player.x += player.speed;
  if (remoteKeys["ArrowLeft"]) player.x -= player.speed;
  if (remoteKeys["ArrowUp"]) player.y -= player.speed;
  if (remoteKeys["ArrowDown"]) player.y += player.speed;

  enemies.forEach(enemy=>{
    if(enemy.x<player.x) enemy.x+=enemy.speed;
    if(enemy.x>player.x) enemy.x-=enemy.speed;
    if(enemy.y<player.y) enemy.y+=enemy.speed;
    if(enemy.y>player.y) enemy.y-=enemy.speed;
  });

  foods.forEach((food,index)=>{
    if(isColliding(player,food)){
      foods.splice(index,1);
      score++;
      enemies.length=0;
      for(let i=0;i<2;i++) spawnEnemy();
      spawnFood();
    }
  });

  enemies.forEach(enemy=>{
    if(isColliding(player,enemy)){
      resetGame(); // 🔥 INSTANT RESTART
    }
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);

  enemies.forEach(e=>{
    ctx.drawImage(enemyImg, e.x, e.y, e.size, e.size);
  });

  foods.forEach(f=>{
    ctx.drawImage(foodImg, f.x, f.y, f.size, f.size);
  });

  ctx.fillText("Score: "+score,10,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function isColliding(a,b){
  return a.x < b.x + b.size &&
         a.x + a.size > b.x &&
         a.y < b.y + b.size &&
         a.y + a.size > b.y;
}

playerImg.onload = ()=> loop();
}

</script>
</body>
</html>
