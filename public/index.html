<!DOCTYPE html>
<html>
<head>
  <title>Remote Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
/* =====================
   GLOBAL RESET
===================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: sans-serif;
  overflow: hidden;
}

/* =====================
   MENU
===================== */
#menu {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh; /* dynamic viewport for mobile */
  gap: 20px;
}

#menu button {
  padding: 16px 24px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #222;
  color: white;
}

/* =====================
   REMOTE UI (MOBILE FIRST)
===================== */
#remoteUI {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100dvh;
  padding: 16px;
}



/* Top input section */
#remoteUI input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#remoteUI, 
#remoteUI button {
  user-select: none;
  -webkit-user-select: none; /* iOS Safari */
}

#remoteUI {
  -webkit-touch-callout: none;
}

#remoteUI .connect {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  background: #007bff;
  color: white;
  border: none;
  margin-bottom: 20px;
}

.dpad {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 1;
  margin: auto;

  display: grid;
  grid-template-areas:
    ". up ."
    "left center right"
    ". down .";

  gap: 16px;
  touch-action: manipulation;
}

.dpad button {
  width: 100%;
  height: 100%;

  /* 🔥 key fix */
  font-size: 6vw;

  /* 🔥 minimum touch size */
  min-width: 70px;
  min-height: 70px;

  border: none;
  border-radius: 18px;
  background: #222;
  color: white;

  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

/* keep positions */
.up    { grid-area: up; }
.left  { grid-area: left; }
.right { grid-area: right; }
.down  { grid-area: down; }

.dpad button:active {
  transform: scale(0.92);
  background: #555;
}

/* Position */
.up    { grid-area: up; }
.left  { grid-area: left; }
.right { grid-area: right; }
.down  { grid-area: down; }

/* Press feedback */
.dpad button:active {
  transform: scale(0.92);
  background: #555;
}

/* =====================
   CANVAS (GAME SCREEN)
===================== */
#gameCanvas {
  width: 100vw;
  height: 100dvh;
  display: block;
  background: white;
}

  .dpad {
  touch-action: none; /* 🔥 CHANGED from manipulation */
}

  #fullscreenBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 12px 18px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      z-index: 1000;
   }


</style>

<body>

<div id="menu">
  <button onclick="startMonitor()">Monitor</button>
  <button onclick="showRemote()">Remote</button>
</div>

  <button id="fullscreenBtn">Go Fullscreen</button>

<div id="remoteUI" style="display:none;">
<input id="roomInput" placeholder="Enter Room ID" />
<button class="connect" onclick="joinRemote()">Connect</button>

<div class="dpad">
  <button class="up" data-key="ArrowUp">↑</button>
  <button class="left" data-key="ArrowLeft">←</button>
  <button class="right" data-key="ArrowRight">→</button>
  <button class="down" data-key="ArrowDown">↓</button>
</div>
  
</div>

<canvas id="gameCanvas" width="800" height="500" style="display:none;"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

   //full screen mode 
  document.getElementById("fullscreenBtn").addEventListener("click", () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); // Safari
  });
  
const socket = io({
  transports: ["websocket"] // 🔥 ADDED: faster, no polling fallback
});

let roomId = null;
let isMonitor = false;

// =====================
// MENU
// =====================

function startMonitor() {
  isMonitor = true;
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameCanvas").style.display = "block";

  socket.emit("createRoom");
}

socket.on("errorRoom", (msg) => {
  alert(msg);
});


// ❌ OLD POLLING (KEPT BUT DISABLED)
// setInterval(() => {
//   if (roomId) {
//     socket.emit("input", { roomId, keys });
//   }
// }, 50);
  // global fix
// 🔥 Modern unified input (works on mobile + desktop)
document.querySelectorAll(".dpad button").forEach(btn => {
  const key = btn.dataset.key;

  btn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    press(key);
  });

  btn.addEventListener("pointerup", (e) => {
    e.preventDefault();
    release(key);
  });

  btn.addEventListener("pointerleave", () => {
    release(key);
  });

  btn.addEventListener("pointercancel", () => {
    release(key);
  });
});


// =====================
// 🔥 NEW FAST INPUT SYSTEM (ADDED)
// =====================

const keys = {}; // already exists
let remoteKeys = {}; // already exists

function press(key) {
  if (!keys[key]) { // 🔥 avoid duplicate sends
    keys[key] = true;

    // 🔥 NEW EVENT-DRIVEN SEND
    socket.emit("input_fast", { roomId, key, state: "down" });
  }

  // ❌ OLD (disabled)
  // keys[key] = true;
}

function release(key) {
  if (keys[key]) {
    keys[key] = false;

    // 🔥 NEW EVENT-DRIVEN SEND
    socket.emit("input_fast", { roomId, key, state: "up" });
  }

  // ❌ OLD (disabled)
  // keys[key] = false;
}


// =====================
// SOCKET EVENTS
// =====================

socket.on("roomCreated", id => {
  roomId = id;
  alert("Room ID: " + roomId);

  setTimeout(() => {
    startGame();
  }, 10000);
});

function showRemote() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("remoteUI").style.display = "block";
}

function joinRemote() {
  roomId = document.getElementById("roomInput").value;
  socket.emit("joinRoom", roomId);
}

socket.on("joinedRoom", () => {
  alert("Connected to monitor");
});


// ❌ OLD RECEIVE (KEPT BUT DISABLED)
// socket.on("input", keys => {
//   remoteKeys = keys;
// });


// 🔥 NEW FAST RECEIVE (ADDED)
socket.on("input_fast", ({ key, state }) => {
  remoteKeys[key] = (state === "down");
});


// =====================
// GAME (UNCHANGED)
// =====================
function startGame(){
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const player = { x:100, y:100, size:60, speed:4 };
const enemies = [];
const foods = [];
let score = 0;

const playerImg = new Image();
playerImg.src = "player.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";

const foodImg = new Image();
foodImg.src = "food.png";

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:40,
    speed:0.7
  });
}

function resetGame(){
  player.x = 100;
  player.y = 100;
  score = 0;
  enemies.length = 0;
  foods.length = 0;

  for(let i=0;i<3;i++) spawnEnemy();
  for(let i=0;i<5;i++) spawnFood();
}

function spawnFood(){
  foods.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:25
  });
}

for(let i=0;i<3;i++) spawnEnemy();
for(let i=0;i<5;i++) spawnFood();

function update(){
  if (remoteKeys["ArrowRight"]) player.x += player.speed;
  if (remoteKeys["ArrowLeft"]) player.x -= player.speed;
  if (remoteKeys["ArrowUp"]) player.y -= player.speed;
  if (remoteKeys["ArrowDown"]) player.y += player.speed;

  enemies.forEach(enemy=>{
    if(enemy.x<player.x) enemy.x+=enemy.speed;
    if(enemy.x>player.x) enemy.x-=enemy.speed;
    if(enemy.y<player.y) enemy.y+=enemy.speed;
    if(enemy.y>player.y) enemy.y-=enemy.speed;
  });

  foods.forEach((food,index)=>{
    if(isColliding(player,food)){
      foods.splice(index,1);
      score++;
      enemies.length=0;
      for(let i=0;i<2;i++) spawnEnemy();
      spawnFood();
    }
  });

  enemies.forEach(enemy=>{
    if(isColliding(player,enemy)){
      resetGame();
    }
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);

  enemies.forEach(e=>{
    ctx.drawImage(enemyImg, e.x, e.y, e.size, e.size);
  });

  foods.forEach(f=>{
    ctx.drawImage(foodImg, f.x, f.y, f.size, f.size);
  });

  ctx.fillText("Score: "+score,10,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function isColliding(a,b){
  return a.x < b.x + b.size &&
         a.x + a.size > b.x &&
         a.y < b.y + b.size &&
         a.y + a.size > b.y;
}

playerImg.onload = ()=> loop();
}
</script>
</body>
</html>
