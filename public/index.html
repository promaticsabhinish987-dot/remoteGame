<!DOCTYPE html>
<html>
<head>
  <title>Remote Game</title>
</head>
<style>
   /* 🔥 RESET FOR MOBILE GAME FEEL */
   #gameCanvas{
      background-color: #fff;
   }
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  touch-action: none; /* prevents scroll/zoom */
  user-select: none;
}

/* FULLSCREEN REMOTE */
#remoteUI {
  display: none;
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
}

/* ROOM INPUT */
#roomInput {
  position: absolute;
  top: 15px;
  left: 15px;
  padding: 10px;
  font-size: 16px;
  z-index: 10;
}

#remoteUI button.connect {
  position: absolute;
  top: 15px;
  left: 160px;
  padding: 10px 15px;
  font-size: 16px;
  z-index: 10;
}

/* 🎮 DPAD CONTAINER */
.dpad {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 180px;
  height: 180px;
}

/* 🎯 BUTTON BASE */
.dpad button {
  position: absolute;
  width: 70px;
  height: 70px;
  font-size: 22px;
  border-radius: 50%;
  border: none;

  background: rgba(255,255,255,0.15);
  color: white;

  backdrop-filter: blur(5px);

  transition: 0.1s;
}

/* 🎮 ACTIVE PRESS EFFECT */
.dpad button:active {
  background: rgba(255,255,255,0.4);
  transform: scale(0.95);
}

/* 🎯 POSITIONING LIKE REAL CONTROLLER */
.up {
  top: 0;
  left: 55px;
}

.down {
  bottom: 0;
  left: 55px;
}

.left {
  left: 0;
  top: 55px;
}

.right {
  right: 0;
  top: 55px;
}

/* 📱 LANDSCAPE OPTIMIZATION */
@media (orientation: landscape) {
  .dpad {
    bottom: 40px;
    left: 40px;
    transform: scale(1.2);
  }
}

/* 📱 SMALL SCREEN BOOST */
@media (max-width: 500px) {
  .dpad {
    transform: scale(1.1);
  }
}
</style>
<body>

<div id="menu">
  <button onclick="startMonitor()">Monitor</button>
  <button onclick="showRemote()">Remote</button>
</div>

<div id="remoteUI" style="display:none;">
<input id="roomInput" placeholder="Enter Room ID" />
<button class="connect" onclick="joinRemote()">Connect</button>

  <div class="dpad">
  <button class="up" onmousedown="press('ArrowUp')" onmouseup="release('ArrowUp')">↑</button>
  <button class="left" onmousedown="press('ArrowLeft')" onmouseup="release('ArrowLeft')">←</button>
  <button class="right" onmousedown="press('ArrowRight')" onmouseup="release('ArrowRight')">→</button>
  <button class="down" onmousedown="press('ArrowDown')" onmouseup="release('ArrowDown')">↓</button>
</div>
</div>

<canvas id="gameCanvas" width="800" height="500" style="display:none;"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let roomId = null;
let isMonitor = false;

// =====================
// MENU
// =====================

function startMonitor() {
  isMonitor = true;
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameCanvas").style.display = "block";

  socket.emit("createRoom");
}
// 🔥 ADD THIS
socket.on("errorRoom", (msg) => {
  alert(msg); // invalid room
});

// 🔥 ADD THIS (outside functions)
setInterval(() => {
  if (roomId) {
    socket.emit("input", { roomId, keys });
  }
}, 50); // 20 FPS network tick


socket.on("roomCreated", id => {
  roomId = id;
  alert("Room ID: " + roomId);
  console.log("Room ID: " + roomId)
  setTimeout(() => {
   startGame(); // start your game
  }, 10000);
  
});

function showRemote() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("remoteUI").style.display = "block";
}

function joinRemote() {
  roomId = document.getElementById("roomInput").value;
  socket.emit("joinRoom", roomId);
}

socket.on("joinedRoom", () => {
  alert("Connected to monitor");
});

// =====================
// REMOTE INPUT
// =====================

const keys = {};

function press(key) {
  keys[key] = true;
//   sendInput();
}

function release(key) {
  keys[key] = false;
//   sendInput();
}

function sendInput() {
  socket.emit("input", { roomId, keys });
}

// =====================
// MONITOR GAME
// =====================

let remoteKeys = {};

// 🔥 WITH (ensures correct object)
socket.on("input", keys => {
  remoteKeys = keys;
});

// ===== YOUR GAME (modified input) =====

function startGame(){
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const player = { x:100, y:100, size:60, speed:4 };
const enemies = [];
const foods = [];
let score = 0;

const playerImg = new Image();
playerImg.src = "player.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";

const foodImg = new Image();
foodImg.src = "food.png";

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:40,
    speed:1
  });
}

// 🔥 ADD THIS
function resetGame(){
  player.x = 100;
  player.y = 100;
  score = 0;
  enemies.length = 0;
  foods.length = 0;

  for(let i=0;i<3;i++) spawnEnemy();
  for(let i=0;i<5;i++) spawnFood();
}

function spawnFood(){
  foods.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:25
  });
}

for(let i=0;i<3;i++) spawnEnemy();
for(let i=0;i<5;i++) spawnFood();

function update(){

  // 🔥 USE REMOTE INPUT INSTEAD OF KEYBOARD
  if (remoteKeys["ArrowRight"]) player.x += player.speed;
  if (remoteKeys["ArrowLeft"]) player.x -= player.speed;
  if (remoteKeys["ArrowUp"]) player.y -= player.speed;
  if (remoteKeys["ArrowDown"]) player.y += player.speed;

  enemies.forEach(enemy=>{
    if(enemy.x<player.x) enemy.x+=enemy.speed;
    if(enemy.x>player.x) enemy.x-=enemy.speed;
    if(enemy.y<player.y) enemy.y+=enemy.speed;
    if(enemy.y>player.y) enemy.y-=enemy.speed;
  });

  foods.forEach((food,index)=>{
    if(isColliding(player,food)){
      foods.splice(index,1);
      score++;
      enemies.length=0;
      for(let i=0;i<2;i++) spawnEnemy();
      spawnFood();
    }
  });

  enemies.forEach(enemy=>{
    if(isColliding(player,enemy)){
      resetGame(); // 🔥 INSTANT RESTART
    }
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);

  enemies.forEach(e=>{
    ctx.drawImage(enemyImg, e.x, e.y, e.size, e.size);
  });

  foods.forEach(f=>{
    ctx.drawImage(foodImg, f.x, f.y, f.size, f.size);
  });

  ctx.fillText("Score: "+score,10,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function isColliding(a,b){
  return a.x < b.x + b.size &&
         a.x + a.size > b.x &&
         a.y < b.y + b.size &&
         a.y + a.size > b.y;
}

playerImg.onload = ()=> loop();
}

</script>
</body>
</html>
